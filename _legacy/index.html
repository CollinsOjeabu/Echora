
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHORA | Autonomous Neural Workforce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #D4FF3F;
            --blue: #3B82F6;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-display {
            font-family: 'Inter Tight', sans-serif;
        }
        .text-lime { color: var(--lime); }
        .bg-lime { background-color: var(--lime); }
        .border-lime { border-color: var(--lime); }
        
        /* Brutalist Glass */
        .glass-brutal {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .lime-glow {
            box-shadow: 0 0 50px rgba(212, 255, 63, 0.15);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--lime); border-radius: 0; }

        /* Scanning line effect */
        .scan-line {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(to bottom, transparent, rgba(212, 255, 63, 0.03), transparent);
            position: fixed;
            top: -100px;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.28.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>
<body>
    <div class="scan-line"></div>
    <div id="root"></div>
</body>
</html>
